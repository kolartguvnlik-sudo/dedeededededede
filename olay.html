<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CGA Güvenlik Sistemi - Durum Bildir</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { margin:0; font-family:'Montserrat', sans-serif; background: #0d0d0d; color:#fff; display:flex; justify-content:center; align-items:flex-start; padding-top:20px; }
        .container { background: #1a1a1a; padding:25px; border-radius:24px; width:92%; max-width:450px; box-shadow:0 20px 40px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.05); position: relative; }
        h1 { text-align:center; margin-bottom:20px; color: #ccff00; font-size: 20px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .status-info { background: #262626; padding: 15px; border-radius: 16px; margin-bottom: 20px; border-left: 4px solid #ccff00; font-size: 13px; line-height: 1.6; }
        .status-info strong { color: #ccff00; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }
        label { display:block; margin-top:12px; margin-bottom:6px; font-weight:600; font-size: 12px; color: #888; text-transform: uppercase; }
        label span { color: #ff4444; } 
        input, textarea { width:100%; padding:14px; border:1px solid #333; border-radius:12px; margin-bottom:5px; font-size:14px; box-sizing: border-box; background: #262626; color: #fff; outline: none; transition: 0.3s; }
        input:focus, textarea:focus { border-color: #ccff00; background: #2d2d2d; }
        textarea { resize:none; height:100px; }
        .char-counter { text-align: right; font-size: 10px; color: #555; margin-top: 2px; margin-bottom: 10px; font-weight: 600; }
        button { width:100%; padding:15px; margin-top:10px; border:none; border-radius:14px; font-weight:800; cursor:pointer; transition:0.3s; text-transform: uppercase; letter-spacing: 1px; }
        #submitBtn { background:#ccff00; color:#000; font-size: 15px; box-shadow: 0 8px 15px rgba(204, 255, 0, 0.2); }
        #submitBtn:disabled { background: #333; color: #666; cursor: not-allowed; box-shadow: none; }
        #backBtn { background:transparent; color:#666; font-size: 12px; border: 1px solid #333; margin-top: 15px; }
        #photoBtns { display: flex; gap: 12px; margin-top: 5px; }
        #photoBtns button { background: #333; color: #fff; flex: 1; font-size: 12px; padding: 12px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        #preview { margin-top:15px; width:100%; border-radius:16px; display:none; border: 2px solid #ccff00; object-fit: cover; }
        #cameraModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; justify-content:center; align-items:center; flex-direction:column; z-index:1000; }
        #cameraModal video { width:95%; max-width:400px; border-radius:20px; border: 2px solid #ccff00; }
        #flashBtn { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.1); border: 1px solid #ccff00; border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1001; }
        #loadingOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); z-index: 9999; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid #262626; border-top: 4px solid #ccff00; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text { color: #ccff00; font-weight: 800; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; text-align: center; }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text" id="loaderTitle">OLAY KAYDEDİLİYOR...</div>
</div>

<div class="container">
    <h1>DURUM BİLDİRİMİ</h1>

    <div class="status-info">
        <strong>Rapor No:</strong> <span id="raporNoLabel">...</span><br>
        <strong>Görevli:</strong> <span id="displayName">Tespit ediliyor...</span>
    </div>

    <label>Görev Yeri / Blok <span>*</span></label>
    <input type="text" id="olayLocation" placeholder="Örn: A Blok Giriş" required>

    <label>Tespit Yeri <span>*</span></label>
    <input type="text" id="tespitYeri" placeholder="Örn: 3. Kat Koridor" required>

    <label>Tespitin Konusu <span>*</span></label>
    <input type="text" id="tespitKonusu" placeholder="Örn: Kapı Açık / Rutin" required>

    <label>Durum Detayı ve Yorum <span>*</span></label>
    <textarea id="olayDesc" maxlength="1350" placeholder="Detayları buraya yazınız..." required></textarea>
    <div id="charCounter" class="char-counter">0 / 1350</div>

    <div id="photoBtns">
        <button id="takePhotoBtn">📷 Foto Çek</button>
        <button id="choosePhotoBtn">📁 Galeri</button>
    </div>
    <img id="preview">
    <input type="file" id="galleryInput" accept="image/*" style="display:none;">

    <button id="submitBtn">OLAYI GÖNDER</button>
    <button id="backBtn">GÜVENLİK PANELİNE DÖN</button>

    <div id="message" style="text-align:center; margin-top:15px; font-weight:bold;"></div>
</div>

<div id="cameraModal">
    <div id="flashBtn">⚡</div>
    <video id="video" autoplay playsinline></video>
    <div style="display:flex; gap:15px; margin-top:20px; width: 90%; max-width: 400px;">
        <button id="snapBtn" style="background:#ccff00; color:#000; flex: 2;">ÇEK</button>
        <button id="closeModalBtn" style="background:#333; color:#fff; flex: 1;">İPTAL</button>
    </div>
</div>

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getDatabase, ref, push, get, set, remove } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

// --- KOLART ŞİFRE ÇÖZÜCÜ SİSTEMİ ---
const CONFIG_KEY = "KOLART_SİSTEM_2026_CGA"; 

const decryptData = (encrypted) => {
    try {
        const bytes = CryptoJS.AES.decrypt(encrypted, CONFIG_KEY);
        const dec = bytes.toString(CryptoJS.enc.Utf8);
        return dec ? JSON.parse(dec) : null;
    } catch (e) { return null; }
};

const siteID = localStorage.getItem("siteID");
const siteConfigStr = localStorage.getItem("siteConfig");
const siteConfig = decryptData(siteConfigStr);

if (!siteID || !siteConfig) { window.location.href = "index.html"; }

let app;
try {
    app = getApps().find(a => a.name === `siteApp-${siteID}`) || initializeApp(siteConfig, `siteApp-${siteID}`);
} catch (e) {
    app = getApps().find(a => a.name === `siteApp-${siteID}`);
}
const db = getDatabase(app);

// MERKEZ VERİTABANI
const merkezConfig = {
    apiKey: "AIzaSyDCJWz80wWlzNhaM2Qnw_e5UkQoc8DoJaU",
    authDomain: "merkez-14bf8.firebaseapp.com",
    projectId: "merkez-14bf8",
    databaseURL: "https://merkez-14bf8-default-rtdb.firebaseio.com"
};
const merkezApp = getApps().find(a => a.name === "merkezApp") || initializeApp(merkezConfig, "merkezApp");
const merkezDb = getDatabase(merkezApp);

// KULLANICI AYARLARI
const user = JSON.parse(sessionStorage.getItem('currentUser')) || {};
const userKey = (user.username || "Bilinmeyen").replace(/\s+/g, '_');
const rawName = (user.name && user.name.trim() !== "") ? (user.name + " " + (user.surname || "")).trim() : userKey;
const guvenlikGorunurAd = rawName.replace(/_/g, ' '); 

document.getElementById('displayName').innerText = guvenlikGorunurAd;

// --- KOTA DOSTU SIKIŞTIRMA FONKSİYONU ---
async function resizeAndCompress(base64Str) {
    return new Promise((resolve) => {
        const img = new Image();
        img.src = base64Str;
        img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 800; 
            let width = img.width;
            let height = img.height;
            if (width > MAX_WIDTH) {
                height *= MAX_WIDTH / width;
                width = MAX_WIDTH;
            }
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', 0.6));
        };
    });
}

// --- RAPOR NO ---
let currentRaporNo = 0;
async function setupRaporNo() {
    const counterRef = ref(merkezDb, "sites/" + siteID + "/reportCounter");
    const snapshot = await get(counterRef);
    currentRaporNo = (snapshot.exists() ? snapshot.val() : 0) + 1;
    document.getElementById('raporNoLabel').innerText = currentRaporNo.toString().padStart(4, '0');
}

// --- GÜVENLİK KONTROLÜ VE BAŞLATMA ---
const auth = getAuth(app);
onAuthStateChanged(auth, (authUser) => {
    if (!authUser) {
        window.location.href = "index.html";
    } else {
        console.log("KOLART: Yetki Onaylandı.");
        setupRaporNo(); 
    }
});

// --- FOTOĞRAF VE FLASH ---
let selectedBase64 = null, stream = null, isFlashOn = false;
const preview = document.getElementById('preview');

document.getElementById('takePhotoBtn').onclick = async () => {
    document.getElementById('cameraModal').style.display='flex';
    try {
        stream = await navigator.mediaDevices.getUserMedia({ 
            video: { 
                facingMode:'environment',
                advanced: [{ torch: false }]
            } 
        });
        document.getElementById('video').srcObject = stream;
    } catch (e) {
        alert("Kameraya erişilemedi!");
    }
};

document.getElementById('flashBtn').onclick = async () => {
    if (!stream) return;
    const track = stream.getVideoTracks()[0];
    const capabilities = track.getCapabilities();
    if (capabilities.torch) {
        isFlashOn = !isFlashOn;
        await track.applyConstraints({ advanced: [{ torch: isFlashOn }] });
        document.getElementById('flashBtn').style.color = isFlashOn ? "#ccff00" : "#fff";
        document.getElementById('flashBtn').style.boxShadow = isFlashOn ? "0 0 15px #ccff00" : "none";
    } else {
        alert("Flaş desteklenmiyor.");
    }
};

document.getElementById('snapBtn').onclick = async () => {
    if (navigator.vibrate) navigator.vibrate([40, 30]); 
    const canvas = document.createElement('canvas');
    const video = document.getElementById('video');
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    const rawData = canvas.toDataURL('image/jpeg', 0.8);
    selectedBase64 = await resizeAndCompress(rawData);
    preview.src = selectedBase64; preview.style.display='block';
    closeCamera();
};

function closeCamera() {
    document.getElementById('cameraModal').style.display='none';
    if(stream) {
        const track = stream.getVideoTracks()[0];
        if (isFlashOn) track.applyConstraints({ advanced: [{ torch: false }] });
        stream.getTracks().forEach(t=>t.stop());
    }
    isFlashOn = false;
    document.getElementById('flashBtn').style.color = "#fff";
    document.getElementById('flashBtn').style.boxShadow = "none";
}

document.getElementById('choosePhotoBtn').onclick = () => document.getElementById('galleryInput').click();
document.getElementById('galleryInput').onchange = (e) => {
    const reader = new FileReader();
    reader.onload = async ev => { 
        selectedBase64 = await resizeAndCompress(ev.target.result); 
        preview.src = selectedBase64; 
        preview.style.display='block'; 
    };
    reader.readAsDataURL(e.target.files[0]);
};

// --- KARAKTER SAYACI ---
document.getElementById('olayDesc').addEventListener('input', (e) => {
    document.getElementById('charCounter').innerText = `${e.target.value.length} / 1350`;
});

// --- KAYIT VE KOTA 50 ---
document.getElementById('submitBtn').addEventListener('click', async () => {
    const overlay = document.getElementById('loadingOverlay');
    const loaderTitle = document.getElementById('loaderTitle');
    const loc = document.getElementById('olayLocation').value.trim();

    if(!loc) return alert("Konum girmelisiniz!");

    overlay.style.display = 'flex';
    const now = new Date();
    const folderDate = `${now.getDate().toString().padStart(2, '0')}-${(now.getMonth() + 1).toString().padStart(2, '0')}-${now.getFullYear()}`;

    try {
        const siraRef = ref(merkezDb, `sites/${siteID}/userOlaySira/${userKey}`);
        const siraSnap = await get(siraRef);
        let sira = siraSnap.exists() ? siraSnap.val() : 0;
        let yeniSira = (sira % 50) + 1; 

        const fihristRef = ref(db, `olayFihrist/${userKey}/${yeniSira}`);
        const fihristSnap = await get(fihristRef);

        if (fihristSnap.exists()) {
            const eski = fihristSnap.val();
            loaderTitle.innerHTML = "KOTA KONTROLÜ (50)...<br><span style='font-size:10px; color:#fff;'>ESKİ KAYIT TEMİZLENİYOR</span>";
            await remove(ref(db, `olay/${eski.tarih}/${userKey}/${eski.id}`));
        }

    loaderTitle.innerText = "YENİ OLAY KAYDEDİLİYOR...";
        const anaDepoRef = push(ref(db, `olay/${folderDate}/${userKey}`));
        const yeniID = anaDepoRef.key;

        // 1. ASIL VERİ KAYDI
        await set(anaDepoRef, {
            raporNo: currentRaporNo.toString().padStart(4, '0'),
            location: loc,
            tespitYeri: document.getElementById('tespitYeri').value,
            konu: document.getElementById('tespitKonusu').value,
            desc: document.getElementById('olayDesc').value,
            guvenlik: guvenlikGorunurAd,
            date: now.toLocaleDateString('tr-TR'),
            time: now.toLocaleTimeString('tr-TR'),
            photoData: selectedBase64,
            timestamp: Date.now()
        });

        // 2. KOTA DOSTU İNDEKSLEME
        await set(ref(db, `olay_listesi/${folderDate}`), true);

        // 3. DİĞER İŞLEMLER
        await set(fihristRef, { id: yeniID, tarih: folderDate });
        await set(siraRef, yeniSira);
        await set(ref(merkezDb, "sites/" + siteID + "/reportCounter"), currentRaporNo);
        await set(ref(merkezDb, "sites/" + siteID + "/hasEvent"), true); 
        await set(ref(db, "hasEvent"), true); 

        if (navigator.vibrate) navigator.vibrate(200);

        loaderTitle.innerHTML = "✅ BAŞARILI!<br><span style='font-size:12px; color:#ccff00;'>Yönlendiriliyorsunuz...</span>";
        setTimeout(() => window.location.href = 'guvenlik.html', 1500);

    } catch (err) {
        console.error(err);
        overlay.style.display = 'none';
        alert("Hata oluştu!");
    }
});

document.getElementById('closeModalBtn').onclick = () => closeCamera();
document.getElementById('backBtn').onclick = () => window.location.href='guvenlik.html';
</script>
</body>
</html>
