<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KOLART — TALİMATLAR</title>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    
    <style>
        :root {
            --primary: #CCFF00;
            --on-primary: #000000;
            --bg-dark: #080808;
            --surface: #0C0C0C;
            --surface-container: #161616;
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.4);
            --border: rgba(255, 255, 255, 0.08);
            --error: #FF4D4D;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
            --project-accent: #FFD700;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-main); min-height: 100vh; display: flex; justify-content: center; }

        .app-container {
            width: 100%; max-width: 390px; background-color: var(--surface);
            min-height: 100vh; display: flex; flex-direction: column;
            border-left: 1px solid var(--border); border-right: 1px solid var(--border);
            position: relative;
        }

        header {
            padding: calc(16px + var(--safe-top)) 20px 16px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); background: rgba(12, 12, 12, 0.9);
            backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 1000;
        }
        .back-btn {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            color: var(--primary); padding: 10px 16px; border-radius: 12px;
            font-weight: 800; font-size: 11px; text-decoration: none; display: flex; align-items: center; gap: 8px;
        }

        main { flex: 1; padding: 20px 16px 120px 16px; }
        .section-title { font-size: 11px; font-weight: 900; color: var(--text-muted); text-transform: uppercase; margin-bottom: 20px; letter-spacing: 1.5px; display: flex; align-items: center; gap: 8px; }

        .msg-card {
            background: var(--surface-container); border: 1px solid var(--border);
            border-radius: 24px; padding: 20px; margin-bottom: 16px;
            position: relative; transition: 0.3s;
        }
        .msg-card.unread { border-left: 4px solid var(--primary); box-shadow: 0 10px 30px rgba(204, 255, 0, 0.05); }
        .msg-card.project-type.unread { border-left: 4px solid var(--project-accent); }
        
        .msg-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .sender-info { font-size: 12px; font-weight: 900; color: var(--primary); text-transform: uppercase; display: flex; align-items: center; gap: 6px; }
        .project-type .sender-info { color: var(--project-accent); }
        .time { font-size: 10px; color: var(--text-muted); font-family: monospace; font-weight: bold; }

        .content { 
            font-size: 15px; line-height: 1.7; color: rgba(255,255,255,0.9); 
            margin-bottom: 20px; white-space: pre-wrap; word-break: break-word;
        }

        .btn-confirm {
            width: 100%; padding: 16px; background: var(--primary);
            color: #000; border: none; border-radius: 16px;
            font-weight: 900; font-size: 13px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: 0.2s;
        }
        .project-type .btn-confirm { background: var(--project-accent); }
        .btn-confirm:active { transform: scale(0.96); }
        .btn-confirm:disabled { background: rgba(255,255,255,0.05); color: var(--text-muted); cursor: default; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.96); backdrop-filter: blur(12px);
            display: none; align-items: center; justify-content: center; z-index: 9999;
            padding: 20px;
        }
        .modal-box {
            background: var(--surface-container); border: 1px solid var(--primary);
            width: 100%; max-width: 340px; border-radius: 32px;
            padding: 40px 25px; text-align: center;
        }
        .modal-icon { font-size: 48px; color: var(--primary); margin-bottom: 20px; }
        .modal-box p { font-size: 15px; line-height: 1.6; color: #fff; margin-bottom: 30px; }
        .modal-box b { color: var(--primary); font-weight: 900; }

        .modal-actions { display: flex; flex-direction: column; gap: 12px; }
        .m-btn { width: 100%; padding: 18px; border-radius: 16px; font-weight: 900; border: none; font-size: 14px; cursor: pointer; }
        .m-yes { background: var(--primary); color: #000; box-shadow: 0 5px 20px rgba(204, 255, 0, 0.2); }
        .m-no { background: transparent; color: var(--text-muted); }

        #toast {
            position: fixed; bottom: calc(30px + var(--safe-bottom)); left: 50%; transform: translateX(-50%);
            background: var(--primary); color: #000; padding: 14px 30px;
            border-radius: 50px; font-weight: 900; display: none; z-index: 10000; font-size: 12px;
        }
    </style>
</head>
<body>

<div id="toast">İŞLEM BAŞARILI</div>

<div id="confirmModal" class="modal-overlay">
    <div class="modal-box">
        <div class="modal-icon"><i class="fas fa-shield-halved"></i></div>
        <p id="modalText">...</p>
        <div class="modal-actions">
            <button class="m-btn m-yes" id="finalConfirmBtn">ONAYLIYORUM</button>
            <button class="m-btn m-no" onclick="closeModal()">İPTAL</button>
        </div>
    </div>
</div>

<div class="app-container">
    <header>
        <a href="guvenlik.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> GERİ
        </a>
        <div style="text-align: right;">
            <div id="userDisplay" style="font-size: 13px; font-weight: 900; color: var(--primary);">...</div>
            <div style="font-size: 9px; color: var(--text-muted); font-weight: 700;">KOLART GÜVENLİK</div>
        </div>
    </header>

    <main>
        <div class="section-title">
            <i class="fas fa-bell" style="color: var(--primary)"></i> TALİMATLAR VE MESAJLAR
        </div>
        
        <div id="msgList">
            <div style="text-align: center; padding-top: 50px;"><i class="fas fa-circle-notch fa-spin" style="color:var(--primary); font-size: 24px;"></i></div>
        </div>
    </main>
</div>

<script type="module">
    import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

    // --- CGA ELITE GÜVENLİ BAŞLATMA ---
    const SECURITY_KEY = "KOLART_SİSTEM_2026_CGA";
    const siteID = localStorage.getItem("siteID");
    const encryptedConfig = localStorage.getItem("siteConfig");

    // Config Çözme: Şifreliyse çöz, değilse düz oku (Atılmayı önleyen 1. kilit)
    let siteConfig = null;
    if (encryptedConfig) {
        try {
            const bytes = CryptoJS.AES.decrypt(encryptedConfig, SECURITY_KEY);
            const decrypted = bytes.toString(CryptoJS.enc.Utf8);
            siteConfig = decrypted ? JSON.parse(decrypted) : JSON.parse(encryptedConfig);
        } catch (e) {
            try { siteConfig = JSON.parse(encryptedConfig); } catch(err) { siteConfig = null; }
        }
    }

    // Kullanıcı Kontrolü: Hem Session hem Local (Atılmayı önleyen 2. kilit)
    const currentUser = JSON.parse(sessionStorage.getItem('currentUser')) || JSON.parse(localStorage.getItem('currentUser'));

    // Kritik Bariyer: Config yoksa at, user yoksa auth bekle
    if (!siteConfig) { 
        window.location.href = "index.html"; 
    }

    // Firebase App: Mevcut olanı bul veya yeni aç
    const appName = siteID ? `siteApp-${siteID}` : "[DEFAULT]";
    const app = getApps().find(a => a.name === appName) || initializeApp(siteConfig, appName);
    const db = getDatabase(app);
    const auth = getAuth(app);

    // Arayüz Hazırlığı
    if (currentUser) {
        document.getElementById("userDisplay").innerText = (currentUser.name || currentUser.username).toUpperCase();
    }
    const userUID = currentUser ? currentUser.username : null;

    let allData = { personal: {}, project: {} };

    // --- AUTH VE MESAJ DİNLEME ---
    onAuthStateChanged(auth, (authUser) => {
        if (!authUser && !currentUser) {
            window.location.href = "index.html";
        } else {
            startListeningMessages();
        }
    });

    function startListeningMessages() {
        const uid = userUID || (authUser ? authUser.displayName : null);
        if (!uid) return;

        // Kişisel Mesajlar
        onValue(ref(db, `user_messages/${uid}`), (snapshot) => {
            allData.personal = snapshot.val() || {};
            renderUI();
        });
        // Proje Mesajları
        onValue(ref(db, `projemesaj`), (snapshot) => {
            allData.project = snapshot.val() || {};
            renderUI();
        });
    }

    /**
     * Mesajın zamanını "En Yeni En Üstte" olacak şekilde sayısal değere çevirir.
     */
    function getSortableTime(msg) {
        try {
            const dateStr = msg.tarih || msg.date || ""; 
            const timeStr = msg.saat || msg.time || "00:00:00";

            if (dateStr.includes(".")) {
                const dateParts = dateStr.split("."); 
                const timeParts = timeStr.split(":"); 

                const day = parseInt(dateParts[0]);
                const month = parseInt(dateParts[1]) - 1; 
                const year = parseInt(dateParts[2]);
                const hour = parseInt(timeParts[0]) || 0;
                const min = parseInt(timeParts[1]) || 0;
                const sec = parseInt(timeParts[2]) || 0;

                return new Date(year, month, day, hour, min, sec).getTime();
            }
            if (msg.timestamp) return Number(msg.timestamp);
            return 0;
        } catch (e) {
            return 0;
        }
    }

    function renderUI() {
        const list = document.getElementById("msgList");
        if (!list) return;
        list.innerHTML = "";
        
        let combined = [];
        const uid = userUID || "UNKNOWN";

        Object.keys(allData.personal).forEach(key => {
            const m = allData.personal[key];
            combined.push({
                ...m,
                id: key,
                origin: 'personal',
                dbPath: `user_messages/${uid}/${key}`,
                sortScore: getSortableTime(m)
            });
        });

        Object.keys(allData.project).forEach(key => {
            const m = allData.project[key];
            combined.push({
                ...m,
                id: key,
                origin: 'project',
                dbPath: `projemesaj/${key}`,
                sortScore: getSortableTime(m)
            });
        });

        if (combined.length === 0) {
            list.innerHTML = `<div style="text-align:center; color:var(--text-muted); margin-top:50px; font-size:12px; font-weight:700;">HENÜZ TALİMAT BULUNMUYOR</div>`;
            return;
        }

        combined.sort((a, b) => b.sortScore - a.sortScore);

        combined.forEach(msg => {
            const isRead = msg.is_read === true;
            const isProject = msg.origin === 'project';
            const content = msg.content || msg.icerik || msg.text || "";
            const from = msg.from || msg.gonderen || "YÖNETİM";
            const date = msg.tarih || msg.date || ""; 
            const time = msg.saat || msg.time || "";

            const div = document.createElement("div");
            div.className = `msg-card ${isRead ? '' : 'unread'} ${isProject ? 'project-type' : ''}`;
            
            div.innerHTML = `
                <div class="msg-header">
                    <div class="sender-info">
                        <i class="fas ${isProject ? 'fa-bullhorn' : 'fa-user-shield'}"></i> 
                        ${from} ${isProject ? '<span style="font-size:8px; opacity:0.7;">(GENEL)</span>' : ''}
                    </div>
                    <div class="time" style="color: var(--primary); opacity: 0.8;">${date} ${time}</div>
                </div>
                <div class="content">${content}</div>
                ${isRead 
                    ? `<button class="btn-confirm" disabled style="opacity: 0.6;"><i class="fas fa-check-double"></i> OKUNDU</button>`
                    : `<button class="btn-confirm" onclick="window.openConfirmModal('${msg.id}', '${from}', '${msg.dbPath}')">OKUDUM, ANLADIM</button>`
                }
            `;
            list.appendChild(div);
        });
    }

    let currentTarget = { key: null, path: null };

    window.openConfirmModal = (key, sender, path) => {
        currentTarget = { key, path };
        const name = currentUser ? (currentUser.name || currentUser.username).toUpperCase() : "PERSONEL";
        document.getElementById("modalText").innerHTML = `<b>${name}</b>, Yetkili <b>${sender}</b> tarafından iletilen talimatı onaylıyor musunuz?`;
        document.getElementById("confirmModal").style.display = "flex";
    };

    window.closeModal = () => document.getElementById("confirmModal").style.display = "none";

    document.getElementById("finalConfirmBtn").onclick = async () => {
        if (!currentTarget.path) return;
        try {
            await update(ref(db, currentTarget.path), { 
                is_read: true, 
                read_at: Date.now() 
            });
            window.closeModal();
            showToast("TALİMAT ONAYLANDI");
        } catch (e) {
            showToast("HATA OLUŞTU!");
        }
    };

    function showToast(text) {
        const t = document.getElementById("toast");
        if (!t) return;
        t.innerText = text;
        t.style.display = "block"; 
        setTimeout(() => t.style.display = "none", 2000);
    }
</script>
<script src="nav.js"></script>
</body>
</html>
