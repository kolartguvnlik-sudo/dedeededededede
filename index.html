<style>
:root {
  color-scheme: dark;
  --cga-bg-main: #000000; /* Saf Siyah */
  --cga-bg-secondary: #080808; /* Çok koyu gri */
  --cga-gold: #f1c40f;
  /* ELITE NEON GÜNCELLEMESİ */
  --cga-neon: #CCFF00; 
  --cga-neon-dark: #b8e600;
  --cga-text-main: #ffffff;
  --cga-card-bg: rgba(255,255,255,0.03); /* Kartı daha şeffaf yapalım siyahla bütünleşsin */
  --cga-border-soft: rgba(255,255,255,0.08);
}

html, body {
  margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
  font-family: 'Montserrat', sans-serif;
  display: flex; justify-content: center; align-items: center;
  background: radial-gradient(circle at top, rgba(204, 255, 0, 0.05), transparent 40%),
              linear-gradient(135deg, var(--cga-bg-main), var(--cga-bg-secondary));
  color: var(--cga-text-main);
  -webkit-touch-callout: none;
}

.container {
  width: 380px;
  padding: 40px 30px 70px;
  border-radius: 26px;
  background: var(--cga-card-bg);
  backdrop-filter: blur(22px);
  box-shadow: 0 0 0 1px var(--cga-border-soft), 0 20px 50px rgba(0,0,0,0.7);
  text-align: center;
  transform: translateY(-20px);
}

h1 { font-size:26px; font-weight:800; color: var(--cga-gold); margin-bottom:8px; cursor:pointer; }

.site-name{
  display:none; font-size:28px; font-weight:800; letter-spacing:1px; margin:1px 0 18px;
  color: var(--cga-neon); 
  text-shadow: 0 0 10px rgba(204, 255, 0, 0.6), 0 0 25px rgba(204, 255, 0, 0.4);
}

.input-group { display:none; flex-direction:column; text-align:left; margin-bottom:28px; }
.input-group.active { display:flex; }

input[type="text"], input[type="password"] { width:100%; padding:12px; margin:8px 0; border-radius:12px; border:none; background: rgba(255,255,255,0.1); color:white; font-size:14px;}
input::placeholder { color: rgba(236,240,241,0.6); }

.remember {display:flex; align-items:center; gap:8px; font-size:14px; margin-top:8px;}
.remember input[type="checkbox"] { cursor:pointer; accent-color: var(--cga-neon); }
.remember label { cursor:pointer; color:#fff; }

.loginBtn {
  width: 150px;
  padding: 13px;
  border: none;
  border-radius: 16px;
  font-weight: 700;
  font-size: 16px;
  cursor: pointer;
  margin-bottom: 0;
  background: linear-gradient(90deg, var(--cga-neon-dark), var(--cga-neon));
  box-shadow: 0 6px 20px rgba(204, 255, 0, 0.35);
  transition: 0.25s;
  color: #000;
}
.loginBtn:hover {
  background: linear-gradient(90deg, var(--cga-neon), var(--cga-neon-dark));
  transform: translateY(-2px) scale(1.05);
}

.message {
  margin-top:15px;
  margin-bottom:40px;
  color:#e74c3c;
  font-weight:600;
  text-align:center;
  min-height:20px;
}

.cga-logo { 
  width: 220px; /* Bir tık daha küçülttüm */
  max-width: 70%; 
  display: block; 
  margin: 55px auto 0; 
  filter: drop-shadow(0 0 12px rgba(241, 196, 15, 0.15));
}
/* --- YENİ NESİL ALT İMZA (FOOTER) --- */
.corner-bottom {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 25px;
  background: rgba(0, 0, 0, 0.3); /* Çok hafif şeffaf siyah */
  backdrop-filter: blur(5px); /* Cam efekti */
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.2px;
  color: rgba(241, 196, 15, 0.7); /* Altın sarısı ama hafif şeffaf */
  border-top: 1px solid rgba(255, 255, 255, 0.05);
  text-transform: uppercase;
  user-select: none;
  pointer-events: none;
  z-index: 50;
}

/* Yazının ortasında parlayan bir efekt */
.corner-bottom span {
  color: #f1c40f;
  text-shadow: 0 0 8px rgba(241, 196, 15, 0.3);
  margin: 0 4px;
}
.corner-top {
  position: fixed;
  top: 10px;
  right: 14px;
  font-size: 10px;
  font-weight: 700; /* Biraz daha kalın */
  /* KRİTİK DEĞİŞİKLİK: Gri yerine parlak altın sarısı */
  color: var(--cga-gold); 
  opacity: 1; /* Tam belirginlik (şeffaflık yok) */
  text-shadow: 0 0 5px rgba(241, 196, 15, 0.4); /* Hafif parlama efekti */
  user-select: none;
  pointer-events: none;
  z-index: 50;
}

.securityText{
  font-size:16px; font-weight:700; color: var(--cga-gold); margin-bottom:20px; cursor:pointer; text-align:center;
  padding:8px 0; letter-spacing:0.5px; transition:0.25s;
}
.securityText:hover{ transform: scale(1.06); color:#f7d35e; }

#qr-reader {
  width: 95vw;
  height: 70vh;
  max-width: 600px;
  max-height: 600px;
  margin: auto;
  border-radius: 12px;
  background: #000;
}

.modal-content { max-width: 95%; }
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.modal.hidden { display: none; }

.modal-box {
  background: #1e1e1e;
  padding: 20px;
  border-radius: 12px;
  width: 85%;
  max-width: 320px;
  text-align: center;
  color: #fff;
}

.modal-actions {
  display: flex;
  gap: 12px;
  margin-top: 20px;
}

.modal-actions button {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

#cancelDisconnect { background: #555; color: #fff; }
#confirmDisconnect { background: #e74c3c; color: #fff; }

.disconnect-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.55); display: flex; align-items: center; justify-content: center; z-index: 9999; }
.disconnect-modal.hidden { display: none; }

* { -webkit-user-select: none; -ms-user-select: none; user-select: none; }
input, textarea {
  -webkit-user-select: text !important;
  user-select: text !important;
  -webkit-touch-callout: default;
  pointer-events: auto;
}


.choiceBtn {
  flex:1;
  border:none;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
  background: rgba(255,255,255,0.1);
  color:#fff;
  transition:0.25s;
}
.choiceBtn:hover { background: rgba(204, 255, 0, 0.2); transform: scale(1.05); }
.choiceBtn.active { background: linear-gradient(90deg, var(--cga-neon-dark), var(--cga-neon)); color:#000; }

.modal { position: fixed; inset:0; background: rgba(0,0,0,0.55); display:flex; align-items:center; justify-content:center; z-index:9999; transition:0.3s; }
.modal.hidden { display:none; }
.modal-box { background:#1e1e1e; border-radius:12px; color:#fff; }

/* GİRİŞ YAP BUTONU - ELITE NEON EDITION */
#secLoginBtn {
    width: 80%; /* Biraz daha geniş, daha güven verici */
    max-width: 280px;
    padding: 16px 0;
    margin: 25px auto 0;
    display: block;
    
    /* Tipografi */
    font-size: 18px;
    font-weight: 900; 
    text-transform: uppercase;
    letter-spacing: 2px;
    font-family: 'Montserrat', sans-serif;
    
    /* Renk ve Tasarım - Senin Neon Rengin */
    background-color: var(--cga-neon); 
    color: #000000; /* Saf siyah yazı ile maksimum kontrast */
    border-radius: 20px;
    border: none;
    cursor: pointer;
    
    /* Neon Glow (Parlama) Efekti */
    /* Katmanlı gölge sayesinde butonun altından ışık sızıyor gibi durur */
    box-shadow: 0 0 15px rgba(204, 255, 0, 0.4), 
                0 10px 30px rgba(0, 0, 0, 0.5);
    
    /* Akıcı Animasyon */
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    position: relative;
    overflow: hidden;
    z-index: 1;
}

/* Üzerine Gelince Parlamayı Artır */
#secLoginBtn:hover {
    transform: translateY(-4px) scale(1.02);
    background-color: #d9ff33; /* Hafif daha açık neon */
    box-shadow: 0 0 25px rgba(204, 255, 0, 0.6), 
                0 15px 40px rgba(0, 0, 0, 0.6);
}

/* Tıklama Hissiyatı */
#secLoginBtn:active {
    transform: scale(0.96);
    box-shadow: 0 0 10px rgba(204, 255, 0, 0.3);
}

/* Butonun içinden geçen hafif bir parlama çizgisi (Opsiyonel Elite Efekt) */
#secLoginBtn::after {
    content: '';
    position: absolute;
    top: -50%;
    left: -60%;
    width: 20%;
    height: 200%;
    background: rgba(255, 255, 255, 0.4);
    transform: rotate(30deg);
    transition: all 0.6s;
    opacity: 0.1;
}

#secLoginBtn:hover::after {
    left: 120%;
}

/* Yükleniyor/Pasif Durumu */
#secLoginBtn:disabled {
    background: #1a1a1a !important;
    color: #444 !important;
    box-shadow: none !important;
    cursor: not-allowed;
    transform: none !important;
}
/* --- HAVALI DÖNEN DESTEK PANELİ (TAMİR EDİLDİ) --- */
.support-wrapper {
  position: fixed;
  bottom: 30px;
  right: 20px;
  z-index: 10000;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 15px;
  /* KRİTİK: Kapsayıcı artık arkadaki giriş butonunu engellemez */
  pointer-events: none; 
}

/* Yuvarlak Buton ve Yazı Grubu */
.support-item {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
  opacity: 0;
  transform: translateY(20px) scale(0) rotate(-180deg);
  transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  /* Kapalıyken tıklanamaz */
  pointer-events: none;
}

.support-wrapper.active .support-item {
  opacity: 1;
  transform: translateY(0) scale(1) rotate(0deg);
  /* Açıkken tıklanabilir */
  pointer-events: auto;
}

/* Yanlardaki Açıklama Yazıları */
.support-label {
  background: rgba(11, 26, 39, 0.9);
  color: #f1c40f;
  padding: 5px 12px;
  border-radius: 10px;
  font-size: 12px;
  font-weight: 700;
  white-space: nowrap;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  border: 1px solid rgba(241, 196, 15, 0.3);
}

/* Yuvarlak İkonlar */
.support-icon {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.4);
  color: white;
}

.btn-whatsapp-icon { background: #25D366; }
.btn-call-icon { background: #3498db; }

/* Ana Yuvarlak Buton */
.main-support-btn {
  width: 65px;
  height: 65px;
  border-radius: 50%;
  background: linear-gradient(135deg, #f1c40f, #d4ac0d);
  color: #0b1a27;
  border: none;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 9px;
  box-shadow: 0 8px 25px rgba(241, 196, 15, 0.5);
  transition: 0.4s;
  /* Butonun kendisine basılabilmesi şart */
  pointer-events: auto;
}

.main-support-btn span.emoji { font-size: 24px; margin-bottom: -2px; }

/* Aktifken Kırmızı X Olma ve Dönme */
.support-wrapper.active .main-support-btn {
  transform: rotate(135deg);
  background: #e74c3c;
  color: #fff;
}
/* Şifre kutusunun konumunu ayarla */
.password-wrapper {
  position: relative;
  width: 100%;
}

/* Göz ikonunun stili */
.toggle-password {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  color: var(--cga-neon);
  font-size: 18px;
  z-index: 10;
  user-select: none;
}
</style>

    let text = name.trim().toLowerCase();
    const mapping = {
        'ç': 'c', 'ğ': 'g', 'ı': 'i', 'i': 'i', 'ö': 'o', 'ş': 's', 'ü': 'u'

                <button id="f_btn" style="width:100%; padding:15px; border-radius:16px; background:linear-gradient(90deg, #27ae60, #2ecc71); color:white; font-weight:800; border:none; cursor:pointer;">GÜNCELLE VE GİRİŞ YAP</button>
            </div>
        </div>`;
    document.body.insertAdjacentHTML('afterbegin', modalHtml);

    document.getElementById('f_btn').onclick = async function() {
        const p1 = document.getElementById('f_p1').value.trim();
        const p2 = document.getElementById('f_p2').value.trim();
        const err = document.getElementById('f_err');

        if(p1.length !== 6) { err.innerText = "ŞİFRE 6 HANELİ OLMALI!"; return; }
        if(p1 !== p2) { err.innerText = "ŞİFRELER UYUŞMUYOR!"; return; }
        if(p1 === "1234") { err.innerText = "LÜTFEN BAŞKA BİR ŞİFRE SEÇİN!"; return; }

        this.disabled = true; this.innerText = "GÜNCELLENİYOR...";

        try {
            await update(ref(activeDB, 'users/' + username), { password: p1 });
            const stored = localStorage.getItem("securityUser");
            if (stored && JSON.parse(stored).username === username) {
localStorage.setItem("securityUser", JSON.stringify({ username, password: maskPass(p1) }));
            }
            sessionStorage.setItem("currentUser", JSON.stringify({username, type}));
            window.location.href = type === "company" ? "sirket.html" : (type === "security" ? "guvenlik.html" : "yetkili.html");
        } catch (e) { err.innerText = "BAĞLANTI HATASI!"; this.disabled = false; this.innerText = "GÜNCELLE VE GİRİŞ YAP"; }
    };
}

function hideQRButtons(){
  qrBtn.style.display="none";
  codeBtn.style.display="none";

function showQRButtons(){
  qrBtn.style.display="flex";

window.addEventListener("load", async ()=>{
  // Tasarımı otomatik olarak Güvenlik sekmesine getir
  if(securityBtn) securityBtn.click();

  // 1. ADIM: Hatırlanan kullanıcıyı doldur (Maskeli şifreyi çözerek)
  const secStored = JSON.parse(localStorage.getItem("securityUser"));
  if(secStored){ 
    secUsername.value = secStored.username; 
    secPassword.value = unmaskPass(secStored.password);
    secRemember.checked = true; 
  }

  // 2. ADIM: Şifreli Config'i al ve Çöz (AES Koruması)
  const savedSiteID = localStorage.getItem("siteID");
  const savedConfigEnc = localStorage.getItem("siteConfig");

  if(savedSiteID && savedConfigEnc){
    // Burası kritik: Şifreli veriyi çözüyoruz
    const siteConfig = decryptData(savedConfigEnc); 
    
    if(siteConfig) {
      // Çözülen config ile Firebase'i başlat
      let siteApp = getApps().find(a => a.name === `siteApp-${savedSiteID}`);
      if(!siteApp) siteApp = initializeApp(siteConfig, `siteApp-${savedSiteID}`);
      
      const siteDB = getDatabase(siteApp);
      
      // UI Ayarları
      hideQRButtons();
      await loadSiteName(siteDB);
    } else {
      // Eğer config çözülemezse (hatalı veri varsa) sistemi temizle
      console.log("Config şifresi çözülemedi, lütfen tekrar kod girin.");
      showQRButtons();
    }
  }
});
// LOGIN (GÜNCELLENMİŞ AUTH KONTROLLÜ)
// LOGIN (GÜNCELLENMİŞ VE BİLGİLENDİRME MESAJLI)
async function loginUser(rawUsername, password, role){
    const cleanUsername = rawUsername.trim();
    const cleanPassword = password.trim();
    const dbUsername = cleanUsername.toLocaleUpperCase('tr-TR');
    const loginBtn = document.getElementById("secLoginBtn"); // Butonu değişkene aldık
    
    msg.textContent = "";
    msg.style.color = "#f1c40f"; // Kontrol sırasında sarı renk yapalım (bekleme rengi)

    const savedEnc = localStorage.getItem("siteConfig");
const siteConfig = savedEnc ? decryptData(savedEnc) : null;
    if(!siteConfig){ msg.textContent="Lütfen QR kodu okutunuz!"; msg.style.color="#e74c3c"; return; }
    if(!cleanUsername || !cleanPassword){ msg.textContent="Ad Soyad ve şifre gerekli!"; msg.style.color="#e74c3c"; return; }

    // --- GİRİŞ BAŞLADI ---
    loginBtn.disabled = true; // Butonu kilitle
    loginBtn.style.opacity = "0.7";
    msg.textContent = "⌛ Bilgileriniz kontrol ediliyor...";

    try {
        const siteId = localStorage.getItem("siteID");
        let app = getApps().find(a=>a.name==`siteApp-${siteId}`);
        if(!app) app=initializeApp(siteConfig,`siteApp-${siteId}`);
        
        const activeDB = getDatabase(app);
        const auth = getAuth(app);

        // --- 1. ADIM: GÖRÜNMEZ AUT GİRİŞİ ---
        const targetEmail = formatToEmail(cleanUsername);
        try {
            await signInWithEmailAndPassword(auth, targetEmail, cleanPassword);
            // Auth başarılı olunca mesajı güncelle
            msg.style.color = "#2ecc71"; // Yeşil yapalım (onay rengi)
            msg.textContent = "✅ Bilgileriniz onaylandı, giriş yapılıyor...";
        } catch (authErr) {
            console.error("Auth Hatası:", authErr.code);
            msg.style.color = "#e74c3c";
            msg.textContent = "❌ AUT Kaydı Bulunamadı veya Şifre Hatalı!";
            loginBtn.disabled = false; // Hatada butonu geri aç
            loginBtn.style.opacity = "1";
            return;
        }

        // --- 2. ADIM: VERİTABANI KONTROLLERİ ---
        // DESTEK PERSONEL VIP
        if(dbUsername === "DESTEK PERSONEL") {
            const dSnap = await get(child(ref(activeDB),'users/'+dbUsername));
            if(dSnap.exists()) {
                sessionStorage.setItem("currentUser", JSON.stringify({username: dbUsername, type: dSnap.val().type}));
                window.location.href = dSnap.val().type === "company" ? "sirket.html" : "guvenlik.html";
                return;
            }
        }

        const adminSnap = await get(child(ref(activeDB),'admin'));
        if(adminSnap.exists()){
            const adminUser = adminSnap.val();
            if(dbUsername===adminUser.username && cleanPassword===adminUser.password){
                sessionStorage.setItem("currentUser", JSON.stringify({username: dbUsername,type:"admin"}));
                window.location.href="mod.html"; return;
            }
        }

        const userSnap = await get(child(ref(activeDB),'users/'+dbUsername));
        if(!userSnap.exists()){ 
            msg.style.color = "#e74c3c";
            msg.textContent="Kullanıcı veritabanında bulunamadı!"; 
            loginBtn.disabled = false;
            loginBtn.style.opacity = "1";
            return; 
        }
        
        const user=userSnap.val();
        if (user.isActive === false) {
            msg.style.color = "#e74c3c";
            msg.textContent = "Hesabınız pasif durumdadır!";
            loginBtn.disabled = false;
            loginBtn.style.opacity = "1";
            return;
        }

        // --- DİNAMİK ŞİFRE KONTROLÜ ---
        const uPass = String(user.password).trim();
        if (uPass === "1234" || uPass.length < 6) {
            let why = uPass === "1234" ? "Şu anki şifreniz varsayılan <b>'1234'</b>'dür. 6 haneli yeni şifre oluşturun." : `Şifreniz <b>${uPass.length}</b> haneli. En az 6 hane olmalı.`;
            forcePasswordChange(user.username, user.type, activeDB, why);
            return;
        }

        sessionStorage.setItem("currentUser", JSON.stringify({username:user.username, type:user.type}));
        
        if(role==="security"){
            if(secRemember.checked) {
    localStorage.setItem("securityUser", JSON.stringify({
        username: cleanUsername, 
        password: maskPass(cleanPassword) 
    }));
}
            else localStorage.removeItem("securityUser");

            if(user.type==="company") window.location.href="sirket.html";
            else if(user.type==="security") window.location.href="guvenlik.html";
            else if(user.type==="admin") window.location.href="yetkili.html";
            else {
                msg.style.color = "#e74c3c";
                msg.textContent="Yetki hatalı!";
                loginBtn.disabled = false;
                loginBtn.style.opacity = "1";
            }
        }

    } catch(err){ 
        console.error(err); 
        msg.style.color = "#e74c3c";
        msg.textContent="Bağlantı hatası!"; 
        loginBtn.disabled = false;
        loginBtn.style.opacity = "1";
    }
}

document.getElementById("secLoginBtn").addEventListener("click", ()=> loginUser(secUsername.value, secPassword.value,"security"));

async function loadSiteName(db){
  try{
    const snap = await get(child(ref(db),"settings/siteName"));
    if(snap.exists()){
      const name=snap.val().trim();
      if(name!==""){ siteNameEl.textContent=name; siteNameEl.style.display="block"; }
    }
  }catch(e){ console.error("Site adı yüklenemedi", e); }
}

qrBtn.addEventListener("click", ()=>{
  setActive(qrBtn);
  qrModal.style.display = "flex";
  const qrDiv = document.getElementById("qr-reader");
  qrDiv.innerHTML = "";
  qrReader = new Html5Qrcode("qr-reader");
  const qrBoxSize = Math.min(window.innerWidth*0.8,300);
  qrReader.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: qrBoxSize },
    async (qrCodeMessage)=>{
      try{ await qrReader.stop(); }catch(e){}
      qrReader=null;
      qrModal.style.display = "none";
      await loadSiteConfig(qrCodeMessage);
      document.getElementById("qrMessage").textContent="İşlem başarılı, şimdi giriş yapabilirsiniz.";
    },
    (err)=>{ console.log("QR tarama:",err);}
  ).catch(err=>{
    alert("Kamera açılamadı: "+err);
    qrModal.style.display = "none";
  });
});

codeBtn.addEventListener("click", ()=>{

});

siteNameEl.addEventListener("touchend",()=>clearTimeout(pressTimer));

function disconnectProject(){
  localStorage.removeItem("siteID");
  localStorage.removeItem("siteConfig");
  sessionStorage.removeItem("currentUser");
  siteNameEl.textContent="";
  siteNameEl.style.display="none";
  showQRButtons(); 
  document.getElementById("qrMessage").textContent="Proje bağlantısından ayrıldınız.";
  msg.textContent="";
}

function openDisconnectModal(){ modal.classList.remove("hidden"); }
function closeDisconnectModal(){ modal.classList.add("hidden"); }
cancelBtn.onclick = closeDisconnectModal;
confirmBtn.onclick = ()=>{ closeDisconnectModal(); disconnectProject(); };

function setActive(button){ [qrBtn, codeBtn].forEach(b=>b.classList.remove("active")); button.classList.add("active"); }

async function loadSiteConfig(inputCode){
  try{
    let siteID;
    if(/^\d{4}$/.test(inputCode)){
      const shortSnap = await get(child(ref(merkezDB), `shortCodes/${inputCode}`));
      if(!shortSnap.exists()){
        msg.textContent = "Kısa kod geçersiz!";
        showQRButtons();
        return null;
      }
      siteID = shortSnap.val();
    } else {
      siteID = inputCode;
    }

    const siteSnap = await get(child(ref(merkezDB), `sites/${siteID}/config`));
    if(!siteSnap.exists()){
      msg.textContent = "Site config bulunamadı!";
      showQRButtons();
      return null;
    }

    const siteConfig = siteSnap.val();
    let siteApp = getApps().find(a => a.name === `siteApp-${siteID}`);
    if(!siteApp) siteApp = initializeApp(siteConfig, `siteApp-${siteID}`);

    const siteDB = getDatabase(siteApp);
    localStorage.setItem("siteID", siteID);
    localStorage.setItem("siteConfig", encryptData(siteConfig));
    hideQRButtons(); 
    await loadSiteName(siteDB);

    msg.textContent = "Site başarıyla yüklendi!";
    return siteDB;

  } catch(err){
    console.error(err);
    msg.textContent = "Site yüklenirken hata oluştu!";
    showQRButtons();
  }
}

closeQRModal.addEventListener("click", async () => {
  if(qrReader){
    try {
      await qrReader.stop();
      qrReader.clear();      
    } catch(e){
      console.error("QR durdurulamadı:", e);
    }
    qrReader = null;
  }
  qrModal.style.display = "none"; 
});
