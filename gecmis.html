<!DOCTYPE html>
<html lang="tr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KOLART — Devriye Günlüğü</title>

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <style>
        :root {
            --primary: #CCFF00;
            --on-primary: #000000;
            --bg-dark: #080808;
            --surface: #0C0C0C;
            --surface-container: #161616;
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.4);
            --border: rgba(255, 255, 255, 0.08);
            --error: #FF4D4D;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-dark); color: var(--text-main); display: flex; justify-content: center; overflow-x: hidden; min-height: 100vh; }

        .app-container {
            width: 100%; max-width: 390px; background-color: var(--surface);
            display: flex; flex-direction: column;
            border-left: 1px solid var(--border); border-right: 1px solid var(--border);
            position: relative; padding-bottom: 40px;
        }

        header {
            padding: 16px 20px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); background: rgba(12, 12, 12, 0.9);
            backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100;
        }
        .back-btn {
            background: rgba(255, 77, 77, 0.15); color: var(--error); border: 1px solid rgba(255, 77, 77, 0.2);
            padding: 8px 14px; border-radius: 12px; font-weight: 800; font-size: 11px;
            text-decoration: none; display: flex; align-items: center; gap: 4px;
        }

        main { flex: 1; padding: 20px 16px; padding-bottom: 100px !important; }

        .date-area { margin-bottom: 24px; text-align: center; }
        .date-input {
            background: var(--surface-container); border: 1px solid var(--border);
            color: var(--primary); padding: 14px; border-radius: 16px; font-weight: 800;
            outline: none; width: 100%; font-size: 14px; text-align: center;
        }
        .date-input::-webkit-calendar-picker-indicator {
            filter: invert(80%) sepia(50%) saturate(5000%) hue-rotate(20deg) brightness(100%) contrast(100%);
            cursor: pointer; opacity: 1;
        }

        .card {
            background: var(--surface-container); border-radius: 28px; padding: 20px;
            margin-bottom: 20px; border: 1px solid var(--border); position: relative;
            overflow: hidden; animation: slideUp 0.4s ease-out;
        }
        @keyframes slideUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }
        
        .card.status-tam { border-top: 4px solid var(--primary); }
        .card.status-eksik { border-top: 4px solid var(--error); }

        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
        .user-label { font-size: 10px; font-weight: 800; color: var(--text-muted); letter-spacing: 1px; }
        .user-name { font-size: 18px; font-weight: 900; color: #fff; text-transform: uppercase; margin-top: 2px; }
        
        .envelope-btn {
            background: rgba(204, 255, 0, 0.1); color: var(--primary);
            width: 44px; height: 44px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; animation: glow 2s infinite;
        }

        .details-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
            background: rgba(0,0,0,0.3); padding: 16px; border-radius: 18px;
            margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.03);
        }
        .detail-item { display: flex; flex-direction: column; }
        .label { font-size: 8.5px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; }
        .val { font-size: 12px; font-weight: 700; color: #fff; margin-top: 2px; }

        .timeline-title { 
            font-size: 10px; font-weight: 900; color: var(--primary); 
            margin: 0 0 12px 4px; letter-spacing: 1px; text-transform: uppercase;
        }
        .point-item {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.03); padding: 12px 16px; border-radius: 12px;
            margin-bottom: 6px; border-left: 3px solid var(--primary);
        }
        .point-name { font-size: 12px; font-weight: 700; color: var(--text-main); }
        .point-time { font-family: monospace; font-size: 13px; font-weight: 900; color: var(--primary); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-box { 
            background: var(--surface-container); padding: 30px; border-radius: 32px; 
            width: 85%; border: 1px solid var(--primary); text-align: center;
        }
        .modal-btn { 
            background: var(--primary); color: #000; border: none; padding: 14px; 
            width: 100%; border-radius: 16px; font-weight: 900; cursor: pointer; margin-top: 20px;
        }

        @keyframes glow { 0%, 100% { box-shadow: 0 0 5px var(--primary); opacity: 1; } 50% { box-shadow: 0 0 15px var(--primary); opacity: 0.7; } }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <a href="guvenlik.html" class="back-btn">
            <span class="material-symbols-outlined" style="font-size: 18px;">arrow_back</span>GERİ
        </a>
        <div style="font-weight: 900; font-size: 14px; letter-spacing: 1px;">DEVRİYE-<span style="color:var(--primary)">GEÇMİŞİ</span></div>
    </header>

    <main>
        <div class="date-area">
            <input type="date" id="mainDate" class="date-input">
        </div>
        <div id="patrolLogs"></div>
    </main>
</div>

<div id="noteModal" class="modal">
    <div class="modal-box">
        <span class="material-symbols-outlined" style="color:var(--primary); font-size:48px;">description</span>
        <h3 style="margin: 10px 0; font-size:14px; letter-spacing:1px;">EKSİK DEVRİYE NOTU</h3>
        <p id="modalNote" style="font-style:italic; color: var(--text-muted); line-height:1.6;"></p>
        <button class="modal-btn" onclick="closeModal()">ANLADIM</button>
    </div>
</div>

<script type="module">
    import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

    // --- GÜVENLİK AYARLARI (REHBER İLE AYNI) ---
    const SECURITY_CONFIG = {
        KEY: "KOLART_SİSTEM_2026_CGA",
    };

    const decryptAES = (data) => {
        if(!data) return null;
        try {
            const bytes = CryptoJS.AES.decrypt(data, SECURITY_CONFIG.KEY);
            const decrypted = bytes.toString(CryptoJS.enc.Utf8);
            return decrypted ? JSON.parse(decrypted) : null;
        } catch (e) { return null; }
    };

    // 1. Verileri Al
    const siteID = localStorage.getItem("siteID");
    const encryptedConfig = localStorage.getItem("siteConfig");
    const currentUser = JSON.parse(sessionStorage.getItem('currentUser'));

    // 2. Kritik Güvenlik Bariyeri
    const siteConfig = decryptAES(encryptedConfig);

    if (!siteID || !siteConfig || !currentUser) {
        localStorage.clear();
        sessionStorage.clear();
        window.location.href = "index.html";
    }

    // 3. Firebase Başlat
    const app = getApps().find(a => a.name === `siteApp-${siteID}`) || initializeApp(siteConfig, `siteApp-${siteID}`);
    const db = getDatabase(app);
    const auth = getAuth(app);

    const patrolLogs = document.getElementById("patrolLogs");
    const mainDate = document.getElementById("mainDate");
    const targetName = (currentUser.name || currentUser.username).toUpperCase();

    // OTURUM KONTROLÜ
    onAuthStateChanged(auth, (user) => {
        if (!user) {
            window.location.href = "index.html";
        } else {
            // Bugünün tarihini ayarla ve yükle
            const simdi = new Date();
            const trTarih = new Intl.DateTimeFormat('tr-TR', {
                year: 'numeric', month: '2-digit', day: '2-digit',
                timeZone: 'Europe/Istanbul'
            }).format(simdi).split('.').reverse().join('-');

            mainDate.value = trTarih;
            loadData(trTarih);
        }
    });

    function calculateDuration(start, end) {
        if (!start || !end) return "--";
        try {
            const s = start.split(':').map(Number);
            const e = end.split(':').map(Number);
            const startDate = new Date(0, 0, 0, s[0], s[1], s[2]);
            const endDate = new Date(0, 0, 0, e[0], e[1], e[2]);
            let diff = (endDate - startDate) / 1000;
            if (diff < 0) diff += 24 * 3600;
            const min = Math.floor(diff / 60);
            const sec = Math.floor(diff % 60);
            return `${min}dk ${sec}sn`;
        } catch(e) { return "--"; }
    }

    async function loadData(date) {
        patrolLogs.innerHTML = "<p style='text-align:center; padding:40px; font-size:12px; color:var(--primary); font-weight:800;'>GÜNLÜK KAYITLARI SORGULANIYOR...</p>";
        
        try {
            const snap = await get(ref(db, `devriyeHistory/${date}/${targetName}`));
            
            if (!snap.exists()) {
                patrolLogs.innerHTML = `<div style='text-align:center; padding:60px 20px; opacity:0.3;'>
                    <span class="material-symbols-outlined" style="font-size:48px;">history_toggle_off</span>
                    <p style="margin-top:10px; font-weight:800; font-size:12px;">${targetName} ADINA KAYIT BULUNAMADI</p>
                </div>`;
                return;
            }

            let allRecords = [];
            const data = snap.val();
            Object.values(data).forEach(r => allRecords.push(r));
            allRecords.sort((a,b) => b.timestamp - a.timestamp);

            patrolLogs.innerHTML = "";
            allRecords.forEach(item => {
                const isEksik = (item.status || "").toLowerCase().includes("eksik");
                const hasNote = item.eksikNotu && item.eksikNotu.trim() !== "";
                const duration = calculateDuration(item.start, item.end);

                const card = document.createElement("div");
                card.className = `card ${isEksik ? 'status-eksik' : 'status-tam'}`;

                let pointsHtml = "";
                if (item.points) {
                    const sorted = Object.values(item.points).sort((a,b) => a.time.localeCompare(b.time));
                    pointsHtml = sorted.map(p => `
                        <div class="point-item">
                            <span class="point-name">${p.name}</span>
                            <span class="point-time">${p.time}</span>
                        </div>
                    `).join('');
                }

                card.innerHTML = `
                    <div class="card-header">
                        <div>
                            <p class="user-label">GÖREVLİ PERSONEL</p>
                            <p class="user-name">${item.name || targetName}</p>
                        </div>
                        ${hasNote ? `
                            <div class="envelope-btn" onclick="window.openNote('${encodeURIComponent(item.eksikNotu)}')">
                                <span class="material-symbols-outlined">mail</span>
                            </div>
                        ` : ''}
                    </div>

                    <div class="details-grid">
                        <div class="detail-item"><span class="label">Başlangıç</span><span class="val">${item.start || '--'}</span></div>
                        <div class="detail-item"><span class="label">Bitiş</span><span class="val">${item.end || '--'}</span></div>
                        <div class="detail-item"><span class="label">Toplam Süre</span><span class="val" style="color:var(--primary)">${duration}</span></div>
                        <div class="detail-item"><span class="label">Durum</span><span class="val" style="color:${isEksik?'var(--error)':'var(--primary)'}">${(item.status || 'TAMAM').toUpperCase()}</span></div>
                    </div>

                    <div class="timeline-title">NOKTA LOGLARI</div>
                    <div class="points-list">${pointsHtml || '<div style="font-size:11px; opacity:0.3; text-align:center;">Nokta kaydı yok.</div>'}</div>
                `;
                patrolLogs.appendChild(card);
            });
        } catch (e) { 
            patrolLogs.innerHTML = "<p style='text-align:center; padding:20px; color:var(--error);'>Sistem hatası veya yetki yetersizliği.</p>"; 
        }
    }

    window.openNote = (n) => {
        document.getElementById("modalNote").innerText = decodeURIComponent(n);
        document.getElementById("noteModal").style.display = "flex";
    }
    window.closeModal = () => document.getElementById("noteModal").style.display = "none";

    mainDate.addEventListener("change", (e) => loadData(e.target.value));

</script>
<script src="nav.js"></script>
</body>
</html>
